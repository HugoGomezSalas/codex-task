name: Grade

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  grade:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Public tests
        id: public
        run: |
          set +e
          npm test
          echo "code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Quality gates
        id: gates
        run: |
          set +e
          git fetch origin "${{ github.base_ref }}" --depth=1

          CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" | tr '\n' ' ')
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

          if echo "$CHANGED" | grep -Eq '(^| )__tests__/|(^| )jest\.config\.js'; then
            echo "tests_changed=1" >> "$GITHUB_OUTPUT"
          else
            echo "tests_changed=0" >> "$GITHUB_OUTPUT"
          fi

          LINES=$(git diff --numstat "origin/${{ github.base_ref }}...HEAD" | awk '{add += $1; del += $2} END {print add + del + 0}')
          echo "lines=$LINES" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Compute score and comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SCORE=0

          if [ "${{ steps.public.outputs.code }}" = "0" ]; then SCORE=$((SCORE+6)); fi
          if [ "${{ steps.gates.outputs.tests_changed }}" = "0" ]; then SCORE=$((SCORE+2)); fi

          L="${{ steps.gates.outputs.lines }}"
          if [ "$L" -le 80 ]; then SCORE=$((SCORE+2)); fi

          BODY=$(cat <<EOF
          ### Auto-grade result
          Score: **$SCORE / 10**

          - Public tests exit code: **${{ steps.public.outputs.code }}** (0 = pass)
          - Test files modified: **${{ steps.gates.outputs.tests_changed }}** (0 = no)
          - Approx. lines changed: **$L**
          - Changed files: ${{ steps.gates.outputs.changed }}
          EOF
          )

          gh pr comment "${{ github.event.pull_request.number }}" --body "$BODY"
